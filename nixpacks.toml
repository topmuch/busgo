# ─── Bus Go — Nixpacks configuration (alternative Coolify build) ───
# Coolify can use Nixpacks if no Dockerfile is present.
# This file provides the same configuration without Docker.

[phases.setup]
nixPkgs = ["...", "sqlite"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = ["bunx prisma generate", "bun run build"]

[phases.start]
cmds = ["npx prisma db push --skip-generate", "bun .next/standalone/server.js"]

[start]
cmd = "sh -c 'npx prisma db push --skip-generate 2>/dev/null; exec bun .next/standalone/server.js'"